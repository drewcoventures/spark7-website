<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <title>Contact the developer of Spark7</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Michroma&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/nav.css">
  <link rel="stylesheet" href="/css/buttons.css">
  <link rel="stylesheet" href="/css/pages.css">
</head>
<body>
<canvas class="neuron-canvas" data-neuron-canvas data-node-count="50" data-pulse-color="#b52d57" data-node-color="#b52d57" data-edge-color="rgba(181,45,87," style="position:fixed;inset:0;width:100%;height:100%;z-index:0;"></canvas>
<div id="s7-nav-placeholder"></div>
<div class="page-wrapper">

  <div class="s7-page-hero">
    <p class="s7-page-hero__eyebrow">Get in Touch</p>
    <h1 class="s7-page-hero__title">Contact <span class="accent">Me</span></h1>
    <p class="s7-page-hero__sub">Questions, feedback, press — I'd love to hear from you.</p>
  </div>

  <section class="section">
    <div class="container">
      <form class="s7-form reveal" action="https://formspree.io/f/xzdjnvqn" method="POST">
        <div class="s7-field">
          <label class="s7-label" for="name">Your Name</label>
          <input class="s7-input" type="text" id="name" name="name" placeholder="Ada Lovelace" required>
        </div>
        <div class="s7-field">
          <label class="s7-label" for="email">Email Address</label>
          <input class="s7-input" type="email" id="email" name="email" placeholder="ada@spark7.app" required>
        </div>
        <div class="s7-field">
          <label class="s7-label" for="subject">Subject</label>
          <input class="s7-input" type="text" id="subject" name="subject" placeholder="e.g. Press Inquiry, Bug Report, Partnership">
        </div>
        <div class="s7-field">
          <label class="s7-label" for="message">Message</label>
          <textarea class="s7-textarea" id="message" name="message" placeholder="Tell us what's on your mind..." required></textarea>
        </div>
        <button type="submit" class="s7-btn s7-btn--primary" style="align-self:flex-start;">Send Message</button>
      </form>
    </div>
  </section>

</div>
<div id="s7-footer-placeholder"></div>
<script type="module">
  import { autoInitNeuronCanvases } from '/js/neuron-canvas.js';
  import { initNav }                from '/js/nav.js';
  import { initScrollReveal }       from '/js/scroll-reveal.js';
  import { injectPartials }         from '/js/partials.js';
  injectPartials(); initNav(); autoInitNeuronCanvases(); initScrollReveal();
</script>
</body>
</html>
