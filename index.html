  <title>Spark7 | Addictive chain reaction game: #1 Drop7 alternative</title>
  <meta name="description" content="Spark7 is the electrifying brain-building puzzle game that challenges your mind and grows your neural connections.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="css/nav.css">

  <link rel="stylesheet" href="css/hero.css">

  <style>
    /* ── Page-level overrides and extras ── */
    body { background: var(--s7-bg-deep); }

    /* Hero canvas fills full viewport */
    .hero-canvas-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    /* Subtle radial vignette so center stays dark */
    .hero-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 70% 60% at 50% 45%,
        rgba(3,6,15,0.0)  0%,
        rgba(3,6,15,0.55) 60%,
        rgba(3,6,15,0.9)  100%
      );
      pointer-events: none;
    }

    /* ── Section: CTA strip ── */
    .cta-strip {
      position: relative;
      z-index: 2;
      padding: 36px 40px 100px;
      text-align: center;
    }
    .cta-strip__label {
      font-family: var(--font-heading);
      font-size: 10px;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .cta-strip__grid {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      max-width: 860px;
      margin-inline: auto;
    }

    /* ── Scroll progress bar ── */
    #scroll-bar {
      position: fixed;
      top: var(--nav-height);
      left: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--s7-cyan), var(--s7-primary));
      width: 0%;
      z-index: 2000;
      transition: width 0.1s linear;
    }
  </style>
</head>

<!-- ════════════════════════════════════════
     SCRIPTS
════════════════════════════════════════ -->
<script type="module">
  import { autoInitNeuronCanvases } from './js/neuron-canvas.js';
  import { initNav }                from './js/nav.js';
  import { initScrollReveal }       from './js/scroll-reveal.js';
  import { injectPartials }         from './js/partials.js';

  // 1. Inject shared nav + footer
  injectPartials();

  // 2. Init nav interactivity (runs after inject)
  initNav();

  // 3. Neuron canvas
  autoInitNeuronCanvases();

  // 4. Scroll reveals
  initScrollReveal();

  // 5. Scroll progress bar
  const scrollBar = document.getElementById('scroll-bar');
  window.addEventListener('scroll', () => {
    const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
    scrollBar.style.width = Math.min(pct, 100) + '%';
  }, { passive: true });
</script>
